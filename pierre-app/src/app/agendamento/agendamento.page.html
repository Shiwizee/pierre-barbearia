<ion-content [fullscreen]="true" class="agendamento-content">

  <!-- Topo -->
  <div class="header-wrapper">
    <img src="assets/seta.png" alt="Voltar" class="btn-back" (click)="voltar()" />
    <h1 class="titulo">Agendar</h1>
    <div class="espacador"></div>
  </div>

  <!-- Logo -->
  <div class="logo-wrapper">
    <img src="assets/logo_barbearia.png" alt="Logo" class="logo" />
  </div>

  <!-- Seção: Serviços -->
  <div class="secao">
    <h2 class="secao-titulo">Serviços e Valores</h2>
    <div class="servicos-lista">
      <div
        class="servico-card"
        *ngFor="let servico of servicos"
        [class.selecionado]="servicoSelecionado === servico"
        (click)="selecionarServico(servico)"
      >
        {{ servico.nome }} - R${{ servico.preco }}
      </div>
    </div>
  </div>

  <!-- Seção: Data -->
  <div class="secao" *ngIf="servicoSelecionado">
    <h2 class="secao-titulo">Selecione o Dia</h2>
    <div class="dias-lista">
      <div
        class="dia-card"
        *ngFor="let dia of diasDisponiveis"
        [class.selecionado]="diaSelecionado === dia"
        (click)="selecionarDia(dia)"
      >
        <span class="dia-nome">{{ dia.nomeDia }}</span>
        <span class="dia-data">{{ dia.dataFormatada }}</span>
      </div>
    </div>
  </div>

  <!-- Seção: Horários -->
  <div class="secao" *ngIf="diaSelecionado">
    <h2 class="secao-titulo">Selecione o Horário</h2>
    <div class="horarios-grade">
      <div
        class="horario-card"
        *ngFor="let hora of horarios"
        [class.selecionado]="horarioSelecionado === hora"
        (click)="selecionarHorario(hora)"
      >
        {{ hora }}
      </div>
    </div>
  </div>

  <!-- Espaço para o botão fixo não cobrir conteúdo -->
  <div style="height: 90px;"></div>

</ion-content>

<!-- Botão fixo -->
<div class="botao-confirmar-wrapper" *ngIf="horarioSelecionado">
  <ion-button expand="block" class="btn-confirmar" (click)="confirmarAgendamento()">
    Confirmar Agendamento
  </ion-button>
</div>
