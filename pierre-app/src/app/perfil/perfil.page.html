<ion-content [fullscreen]="true" class="perfil-content">

  <!-- Topo -->
  <div class="header-wrapper">
    <img src="assets/seta.png" alt="Voltar" class="btn-back" (click)="voltar()" />
    <h1 class="titulo">Meu Perfil</h1>
    <div class="espacador"></div>
  </div>

  <!-- Identificação -->
  <div class="identificacao-wrapper">
    <div class="avatar-clicavel" (click)="selecionarFoto()">
      <img [src]="fotoExibida" alt="Perfil" class="perfil-avatar" />
      <div class="avatar-overlay">
        <span class="avatar-overlay-texto">Alterar</span>
      </div>
    </div>
  
    <input
      #inputFoto
      type="file"
      accept="image/jpeg,image/jpg,image/png,image/webp"
      style="display: none"
      (change)="onFotoSelecionada($event)"
    />
  
    <p class="perfil-nome">{{ apelido || nome }}</p>
  </div>

  <!-- Dados -->
  <div class="dados-wrapper">

    <div class="dado-item">
      <p class="dado-label">Nome completo</p>
      <ion-input
        class="dado-input"
        type="text"
        [(ngModel)]="nome"
        [readonly]="true"
      ></ion-input>
    </div>

    <div class="dado-item">
      <p class="dado-label">Apelido (opcional)</p>
      <ion-input
        class="dado-input"
        type="text"
        placeholder="Como prefere ser chamado?"
        [(ngModel)]="apelido"
        [readonly]="!editando"
        [class.editavel]="editando"
      ></ion-input>
    </div>

    <div class="dado-item">
      <p class="dado-label">Email</p>
      <ion-input
        class="dado-input"
        type="email"
        [(ngModel)]="email"
        [readonly]="!editando"
        [class.editavel]="editando"
      ></ion-input>
    </div>

    <div class="dado-item">
      <p class="dado-label">Telefone</p>
      <ion-input
        id="telefone-perfil"
        class="dado-input"
        type="tel"
        [(ngModel)]="telefone"
        [readonly]="!editando"
        [class.editavel]="editando"
        (ionInput)="formatarTelefone($event)"
      ></ion-input>
    </div>

  </div>

  <!-- Botões -->
  <div class="botoes-wrapper">

    <ion-button
      expand="block"
      class="btn-editar"
      (click)="toggleEditar()"
    >
      {{ editando ? 'Salvar Alterações' : 'Editar Perfil' }}
    </ion-button>

    <ion-button
      expand="block"
      class="btn-sair"
      (click)="sair()"
    >
      Sair
    </ion-button>

  </div>

</ion-content>
